monolog:
  channels: ['my_plugin_channel', 'update_orders_channel']

  handlers:
    myPluginLogHandler:
      type: rotating_file
      path: "%kernel.logs_dir%/my_plugin_%kernel.environment%.log"
      level: debug
      channels: [ "my_plugin_channel"]

    openOrdersLogHandler:
      type: rotating_file
      path: "%kernel.logs_dir%/open_orders_%kernel.environment%.log"
      level: debug
      channels: [ "update_orders_channel" ]